<!DOCTYPE html>
<html lang="pt" xmlns:th="http://www.thymeleaf.org">
<head>

    <meta charset="utf-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1" />
    <meta name="description" content="" />
    <meta
        name="author"
        content="Mark Otto, Jacob Thornton, and Bootstrap contributors"
    />
    <meta name="generator" content="Astro v5.13.2" />
    <title>Headers · Bootstrap v5.3</title>
    <link
        rel="canonical"
        href="https://getbootstrap.com/docs/5.3/examples/headers/"
    />
    <!-- Bootstrap CSS -->
    <link
    href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.2/dist/css/bootstrap.min.css"
    rel="stylesheet"
    />

    <!-- Bootstrap JS -->
    <script src="https://cdn.jsdelivr.net/npm/bootstrap@5.3.2/dist/js/bootstrap.bundle.min.js"></script>
      
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Resultados da Pesquisa</title>
    
    <link rel="stylesheet" th:href="@{/css/styles.css}" />
    <link rel="stylesheet" th:href="@{/css/headers.css}" />
    <link rel="stylesheet" th:href="@{/css/urlSearchResults.css}" />

</head>
<body>
    <div class="container">
        <header
          class="d-flex flex-wrap justify-content-center py-3 mb-4 border-bottom"
        >
          <ul class="nav nav-pills">
            <li class="nav-item">
              <a th:href="@{/}" class="nav-link" >Home</a>
            </li>
            <li class="nav-item"><a th:href="@{/goToSearch}" class="nav-link" aria-current="page">Search</a></li>
            <li class="nav-item"><a th:href="@{/goToSearch?wichOne=true}" class="nav-link">Index URL</a></li> <!-- o valor 1 é usado para diferenciar se o goToSearch vai para o metodo de indexar URL ou pesquisa de palavra-->
          </ul>
        </header>
        
      </div>

      <div class="search-results-container">
        <h3>Resultados da Pesquisa</h3>
    
        <div id="results"></div>
    
        <script th:inline="javascript">
            let results = /*[[${resultado}]]*/ [];
    
            const container = document.getElementById("results");
    
            results.forEach(result => {
                const div = document.createElement("div");
                div.classList.add("result-item");
    
                div.innerHTML = `
                    <h2 class="result-title">
                        <a href="${result}" target="_blank">Press to visit</a>
                    </h2>
                    <span class="result-url">${result}</span>
                `;
    
                container.appendChild(div);
            });
        </script>
    </div>

</body>
</html>
