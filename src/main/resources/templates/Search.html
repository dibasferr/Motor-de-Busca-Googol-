<!doctype html>
<html lang="en" data-bs-theme="auto">
  <head>
    <!-- Bootstrap CSS -->
    <link
    href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.2/dist/css/bootstrap.min.css"
    rel="stylesheet"
    />

    <!-- Bootstrap JS -->
    <script src="https://cdn.jsdelivr.net/npm/bootstrap@5.3.2/dist/js/bootstrap.bundle.min.js"></script>
    
    <link rel="stylesheet" th:href="@{/css/styles.css}" />
    <link rel="stylesheet" th:href="@{/css/headers.css}" />
    <link rel="stylesheet" th:href="@{/css/indexSearch.css}" />

  </head>
  <body>
    <div class="container">
      <header
        class="d-flex flex-wrap justify-content-center py-3 mb-4 border-bottom"
      >
        <ul class="nav nav-pills">
          <li class="nav-item"> <a th:href="@{/}" class="nav-link">Home</a></li>
          
          <li class="nav-item">
            <a th:href="@{/goToSearch}" class="nav-link active" aria-current="page">Search</a>
          </li>

          <li class="nav-item"><a th:href="@{/goToSearch?wichOne=true}" class="nav-link">Index URL</a></li>

        </ul>
      </header>


      <main>
        <!-- Logo "Googol" -->
        <div class="googol-logo">
            <span>G</span><span>o</span><span>o</span><span>g</span><span>o</span><span>l</span>
        </div>
        <form th:action="@{/Search}" th:object="${searchForm}" method="Get" class="col-12 col-lg-auto mb-3 mb-lg-0 me-lg-3 d-flex flex-column align-items-center" role="search">
          
          <input th:field="*{word}"
              type="search"
              class="form-control bg-dark text-white mb-2"
              placeholder="Search..."
              aria-label="Search"
            />

            <div class="form-check">
                <input class="form-check-input" 
                      type="checkbox" 
                      id="option1" 
                      th:field="*{indexHackerNews}" 
                      value="yes">
                
                <label class="form-check-label" for="option1">
                    Index topStories
                </label>
            </div>

          <button type="submit" class="btn btn-outline-dark" style="width: 150px;">
              Search
          </button>

        </form>
        





      </main>
      
    </div>
    </body>
</html>
