<!DOCTYPE html>
<html lang="pt" xmlns:th="http://www.thymeleaf.org">

  <head>

    <meta name="generator" content="Astro v5.13.2" />
    <title>Estatísticas</title>
    <link
      rel="canonical"
      href="https://getbootstrap.com/docs/5.3/examples/headers/"
    />
    <!-- Bootstrap CSS -->
    <link
    href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.2/dist/css/bootstrap.min.css"
    rel="stylesheet"
    />

    <!-- Bootstrap JS -->
    <script src="https://cdn.jsdelivr.net/npm/bootstrap@5.3.2/dist/js/bootstrap.bundle.min.js"></script>
    <script src="//cdn.jsdelivr.net/npm/@stomp/stompjs@5.0.0/bundles/stomp.umd.min.js"></script>
    
    <link rel="stylesheet" th:href="@{/css/styles.css}" />
    <link rel="stylesheet" th:href="@{/css/headers.css}" />
    <link rel="stylesheet" th:href="@{/css/index.css}" />

  </head>
  <body>
    <div class="container">
      <header
        class="d-flex flex-wrap justify-content-center py-3 mb-4 border-bottom"
      >
        <ul class="nav nav-pills">
          <li class="nav-item">
            <a th:href="@{/}" class="nav-link active" aria-current="page">Home</a>
          </li>
          <li class="nav-item"><a th:href="@{/goToSearch}" class="nav-link">Search</a></li>
          <li class="nav-item"><a th:href="@{/goToSearch?wichOne=true}" class="nav-link">Index URL</a></li> <!-- o valor 1 é usado para diferenciar se o goToSearch vai para o metodo de indexar URL ou pesquisa de palavra-->
        </ul>
      </header>

      <main>
        <div class="table-container mb-5 rounded-3">
            <h1>📦Barrels Disponiveis</h1>
            <table class="table table-striped styled-table">
                <thead>
                </thead>
                <tbody id="barrels-list">
                    </tbody>
            </table>
        </div>
    
        <div class="table-container mb-5 rounded-3">
            <h1>⏱️Tempo medio de execução</h1>
            <p class="display-6 text-center" id="time-display">
                Aguardando conexão WebSocket...
            </p>
        </div>
    
    
        <div class="table-container rounded-3">
            <h1>🏆 Top 10 Pesquisas (Atualização em Tempo Real)</h1>
            
            <ol class="top-ten-list" id="top-ten-dynamic">
                <li class="list-item">
                    <span class="search-term">Conectando...</span>
                </li>
            </ol>
        </div>
    
        <script th:inline="javascript">
            // Variável global para o cliente STOMP
            let stompClient = null;
    
            function connect() {
                stompClient = new StompJs.Client({
                    // Usando window.location.host para funcionar em diferentes ambientes
                    brokerURL: 'ws://' + window.location.host + '/my-websocket',
                    reconnectDelay: 5000,
                    onConnect: (frame) => {
                        console.log("Conectado ao WebSocket:", frame);
                        // 1. Apaga a mensagem de 'conectando...'
                        //ocument.getElementById("time-display").textContent = "Conexão estabelecida.";
    
                        // 2. Assina o tópico
                        stompClient.subscribe('/topic/messages', function(message) {
                            console.log("Mensagem raw:", message.body);
                            const payload = JSON.parse(message.body);
                            console.log("Payload:", payload);
                            
                            // Garante que o payload.content existe antes de chamar showMessage
                            if (payload.content) {
                                showMessage(payload.content);
                            }
                        });
                    },
                    onStompError: (frame) => {
                        console.error('Erro no STOMP:', frame);
                        document.getElementById("time-display").textContent = "Erro na conexão WebSocket.";
                    }
                });
                stompClient.activate();
            }
            
            const initialStats = [[${initialStatus}]];
            if(initialStats){
              showMessage(initialStats);
            }

            function showMessage(msg) {
                console.log("Mensagem recebida e processada.");
                console.log(msg)
                // --- 1. ATUALIZA TIME ---
                // Assumindo que msg.time é uma string de timestamp.
                const timeDisplay = document.getElementById("time-display");
                timeDisplay.textContent = msg.execTime[0] + " ms" || "N/A";
    
                // --- 2. ATUALIZA BARRELS (Tabela) ---
                const barrelsTBody = document.getElementById("barrels-list");
                barrelsTBody.innerHTML = ''; // Limpa a lista anterior

                if (msg.barrels && Array.isArray(msg.barrels)) {
                    msg.barrels.forEach((barrel, index) => {
                        let row = barrelsTBody.insertRow();
                        let c1 = row.insertCell(0); // Nome do barrel
                        let c2 = row.insertCell(1); // Tamanho correspondente

                        // Adiciona a classe de estilo da linha de tabela Bootstrap
                        row.classList.add('table-row'); 

                        c1.textContent = barrel;
                        c2.textContent = msg.sizes[index]; // Pega o tamanho da outra lista
                    });
                }

                // --- 3. ATUALIZA TOP TEN (Lista Classificada) ---
                const topTenList = document.getElementById("top-ten-dynamic");
                topTenList.innerHTML = ''; // Limpa a lista anterior
                if (msg.topTen && Array.isArray(msg.topTen)) {
                    msg.topTen.forEach((item, index) => {
                        // Cria o elemento <li>
                        const listItem = document.createElement('li');
                        listItem.className = 'list-item';
    
                        // Cria e configura o Rank
                        const rankSpan = document.createElement('span');
                        rankSpan.className = 'rank';
                        rankSpan.textContent = index + 1; // 1-based index
                        
                        // Cria e configura o Search Term
                        const termSpan = document.createElement('span');
                        termSpan.className = 'search-term';
                        termSpan.textContent = item; // O item é o termo de pesquisa
    
                        // Adiciona os spans ao <li>
                        listItem.appendChild(rankSpan);
                        listItem.appendChild(termSpan);
    
                        // Adiciona o <li> ao <ol>
                        topTenList.appendChild(listItem);
                    });
                }
            }
    
            // Inicia a conexão ao carregar a página
            connect();
        </script>
    </main>
      
    </div>
    </body>
</html>
