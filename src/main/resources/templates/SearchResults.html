<!DOCTYPE html>
<html lang="en">
<head>
    <!-- Bootstrap CSS -->
    <link
    href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.2/dist/css/bootstrap.min.css"
    rel="stylesheet"
    />
    <!-- Bootstrap JS -->
    <script src="https://cdn.jsdelivr.net/npm/bootstrap@5.3.2/dist/js/bootstrap.bundle.min.js"></script>
    
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Album Grid</title>

  <link rel="stylesheet" th:href="@{/css/styles.css}" />
  <link rel="stylesheet" th:href="@{/css/headers.css}" />
  <link rel="stylesheet" th:href="@{/css/indexSearch.css}" />

</head>

<body>

    <header
        class="d-flex flex-wrap justify-content-center py-3 mb-4 border-bottom"
        >
        <ul class="nav nav-pills">
            <li class="nav-item"><a th:href="@{/}" class="nav-link">Home</a></li>
            
            <li class="nav-item"><a th:href="@{/goToSearch}" class="nav-link">Search</a></li>

            <li class="nav-item"><a th:href="@{/goToSearch?wichOne=true}" class="nav-link">Index URL</a></li>
        </ul>
    </header>

    <!-- Fazer Um ciclo for para iterar sobre o resultado e fazer print das 10 paginas-->
    <div class="album">
      <div class="row" id="resultsRow">
      </div>
    </div>

    <div class="mt-3">
      <button id="prevBtn" class="btn btn-secondary">Anterior</button>
      <button id="nextBtn" class="btn btn-primary">Próximo</button>
    </div>

    <!-- POPUP Hacker News -->
    <script th:if="${hnIndexMessage}">
      alert('[[${hnIndexMessage}]]');
    </script>

    
  <script th:inline="javascript">
    let results = /*[[${resultado}]]*/ [];
  </script>
  
  <script>
    const resultsRow = document.getElementById("resultsRow");
    const prevBtn = document.getElementById("prevBtn");
    const nextBtn = document.getElementById("nextBtn");
  
    let currentPage = 0;
    const pageSize = 10;
  
    function renderPage() {
      // Limpa o container
      resultsRow.innerHTML = "";
  
      // Calcula o intervalo da página
      const start = currentPage * pageSize;
      const end = start + pageSize;
  
      const pageItems = results.slice(start, end);
  
      // Renderiza apenas os 10 itens
      pageItems.forEach(result => {
        resultsRow.innerHTML += `
          <div class="col col-sm-2 col-md-3">
            <div class="card">
              <div class="thumbnail">${result.titulo}</div>
              <div class="card-body">
                <p class="card-text">${result.citacao}</p>
                <div class="d-flex justify-content-between align-items-center">
                  <div class="btn-group">
                    <button onclick="window.open('${result.url}', '_blank')">View</button>
                  </div>
                  <small class="text-body-secondary">${result.url}</small>
                </div>
              </div>
            </div>
          </div>
        `;
      });
  
    }
  
    // Eventos de navegação
    prevBtn.addEventListener("click", () => {
      if (currentPage > 0) {
        currentPage--;
        renderPage();
      }
    });
  
    nextBtn.addEventListener("click", () => {
      if ((currentPage + 1) * pageSize < results.length) {
        currentPage++;
        renderPage();
      }
    });
  
    // Renderizar a primeira página ao carregar
    renderPage();
  </script>


    
    <div class="area-de-exibicao">
      <h12>📜  Análise contextualizada </h12>
      <p th:text="${resultadoCompletion}"></p>
    </div>
    
</body>
</html>
